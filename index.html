<!-- Reading this as: Interactive game simulator dashboard for sports/map enthusiasts, with a dark-tech / developer-console language, leaning toward custom monospace + thin borders + Phosphor Icons + tactical high-contrast green accents. -->

<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 World Cup Conquest Simulator</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- D3.js and TopoJSON CDN -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson@3"></script>
  <!-- Phosphor Icons CDN -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- Font and Custom Styling -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;700&family=Geist:wght@300;400;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Geist', 'sans-serif'],
            mono: ['Geist Mono', 'monospace'],
          },
          colors: {
            console: {
              bg: '#0a0b0d',
              panel: '#111317',
              border: '#1f242e',
              text: '#e2e8f0',
              accent: '#00ff66', // Tactical Green
              accentHover: '#00d655',
              dimText: '#6272a4',
              red: '#ff5555'
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #0a0b0d;
      font-family: 'Geist', sans-serif;
    }
    .country {
      stroke: #161a22;
      stroke-width: 0.5px;
      transition: fill 0.4s cubic-bezier(0.16, 1, 0.3, 1), stroke-width 0.2s ease, opacity 0.3s ease;
      cursor: crosshair;
    }
    .country:hover {
      stroke: #00ff66;
      stroke-width: 1.2px;
    }
    .graticule {
      fill: none;
      stroke: #1b202b;
      stroke-width: 0.5px;
      pointer-events: none;
    }
    /* Scrollbar style */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0b0d;
    }
    ::-webkit-scrollbar-thumb {
      background: #1f242e;
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #00ff66;
    }
  </style>
</head>
<body class="text-console-text min-h-screen flex flex-col font-sans select-none antialiased">

  <!-- Header (Max Height Cap: 64px) -->
  <header class="h-16 bg-console-panel border-b border-console-border px-6 flex items-center justify-between shadow-sm z-10">
    <div class="flex items-center space-x-3">
      <div class="w-3 h-3 bg-console-accent rounded-sm animate-pulse"></div>
      <span class="font-mono text-sm tracking-wider font-bold uppercase text-console-accent">Conquest.io // World Cup 2026</span>
    </div>
    
    <!-- Central Active Date -->
    <div class="flex items-center space-x-2">
      <span class="text-[10px] uppercase font-mono text-console-dimText">Status: Simulating</span>
      <div id="current-date-badge" class="bg-console-bg border border-console-border px-3 py-1 font-mono text-xs font-bold text-console-accent tracking-widest rounded">
        2026-06-11
      </div>
    </div>
  </header>

  <!-- Mobile Tabs (Visible only on mobile/tablet) -->
  <div class="lg:hidden flex border-b border-console-border bg-console-panel font-mono text-[10px] text-console-dimText">
    <button onclick="switchMobileTab('map')" id="tab-map" class="flex-1 py-3 text-center border-r border-console-border text-console-accent font-bold">MAP VIEW</button>
    <button onclick="switchMobileTab('leaderboard')" id="tab-leaderboard" class="flex-1 py-3 text-center border-r border-console-border">HOLDINGS</button>
    <button onclick="switchMobileTab('logs')" id="tab-logs" class="flex-1 py-3 text-center">FEED</button>
  </div>

  <!-- Dashboard Workspace Grid -->
  <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
    
    <!-- Left Sidebar: Leaderboard & Logs (Console Panel layout) -->
    <aside id="sidebar-panel" class="w-full lg:w-96 bg-console-panel border-b lg:border-b-0 lg:border-r border-console-border flex flex-col h-[400px] lg:h-auto overflow-hidden">
      
      <!-- Section 1: Leaderboard -->
      <div id="leaderboard-section" class="flex-1 p-5 flex flex-col overflow-hidden border-b border-console-border">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-[10px] font-mono uppercase tracking-widest text-console-dimText flex items-center space-x-1.5">

            <span>Territorial Holdings</span>

        </div>
        
        <div id="leaderboard" class="space-y-1.5 overflow-y-auto flex-1 pr-1 font-mono text-xs">

    </aside>

    <!-- Main Map Visualization Section -->
    <main id="map-section" class="flex-1 bg-console-bg relative flex items-center justify-center p-6 overflow-hidden">
      <!-- Interactive Grid Background Overlay -->
      <div class="absolute inset-0 bg-[linear-gradient(to_right,#161a22_1px,transparent_1px),linear-gradient(to_bottom,#161a22_1px,transparent_1px)] bg-[size:4rem_4rem] opacity-30 pointer-events-none"></div>

      <!-- Conquest Large Event Alert Banner -->
      <div id="alert-banner" class="absolute top-6 left-1/2 transform -translate-x-1/2 -translate-y-4 bg-console-accent text-console-bg px-6 py-3 font-mono text-[11px] font-bold uppercase tracking-widest rounded-sm shadow-2xl flex items-center space-x-2 border border-console-accent pointer-events-none opacity-0 transition-all duration-300 z-50">
        <i class="ph-bold ph-warning-circle text-sm animate-pulse"></i>
        <span id="alert-message">Conquest System Alert</span>

      <div id="map-container" class="w-full h-full flex items-center justify-center relative">
        <svg id="world-map" class="w-full h-full max-h-[80vh] drop-shadow-2xl"></svg>
        
        <!-- Legend Overlay -->
        <div class="absolute bottom-4 left-4 bg-console-panel/90 border border-console-border p-3 rounded font-mono text-[10px] text-console-dimText space-y-1.5 backdrop-blur-md">
          <div class="flex items-center space-x-2">
            <span class="w-2.5 h-2.5 bg-console-accent/25 border border-console-accent rounded-sm"></span>
            <span class="text-console-text">Active Factions</span>
          </div>
          <div class="flex items-center space-x-2">
            <span class="w-2.5 h-2.5 bg-[#1e2430] border border-console-border rounded-sm"></span>
            <span>Unoccupied / Eliminated</span>
          </div>
        </div>

        <!-- Custom Tooltip (Anti-slop style) -->
        <div id="tooltip" class="absolute hidden bg-console-panel border border-console-border text-console-text text-xs rounded-sm p-3 pointer-events-none shadow-2xl z-50 font-mono space-y-1 backdrop-blur-md max-w-sm">
          <!-- Managed via JS -->
        </div>
      </div>
    </main>

  </div>

  <!-- Footer Navigation / Timeline Panel -->
  <footer class="bg-console-panel border-t border-console-border p-5 z-10">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between space-y-4 md:space-y-0 md:space-x-8">
      
      <!-- Tactical Media Center -->
      <div class="flex items-center space-x-2">
        <button id="btn-prev" title="Previous Day" class="w-9 h-9 bg-console-bg border border-console-border hover:border-console-accent text-console-text hover:text-console-accent flex items-center justify-center rounded-sm transition active:scale-95">
          <i class="ph-bold ph-caret-left text-sm"></i>
        </button>
        <button id="btn-play" title="Auto Play" class="px-5 h-9 bg-console-accent hover:bg-console-accentHover text-console-bg font-mono font-bold text-xs uppercase tracking-wider flex items-center justify-center space-x-2 rounded-sm transition active:scale-95">
          <i id="play-icon" class="ph-fill ph-play text-xs"></i>
          <span id="play-text">Play</span>
        </button>
        <button id="btn-next" title="Next Day" class="w-9 h-9 bg-console-bg border border-console-border hover:border-console-accent text-console-text hover:text-console-accent flex items-center justify-center rounded-sm transition active:scale-95">
          <i class="ph-bold ph-caret-right text-sm"></i>
        </button>
        <button id="btn-reset" title="Reset Timeline" class="w-9 h-9 bg-console-bg border border-console-border hover:border-console-red text-console-dimText hover:text-console-red flex items-center justify-center rounded-sm transition active:scale-95">
          <i class="ph-bold ph-arrow-counter-clockwise text-sm"></i>
        </button>
      </div>

      <!-- Linear Timeline Scrub Slider -->
      <div class="flex-1 w-full flex items-center space-x-4">
        <span class="text-[10px] text-console-dimText font-mono" id="timeline-start">JUN 11</span>
        
        <div class="flex-1 relative flex items-center">
          <input type="range" id="timeline-slider" class="w-full accent-console-accent h-1 bg-console-border rounded-lg appearance-none cursor-pointer hover:bg-console-border/80 transition" min="0" max="0" value="0">
        </div>
        
        <span class="text-[10px] text-console-dimText font-mono" id="timeline-end">JUL 19</span>
      </div>

      <!-- Simulation Rate Info -->
      <div class="text-[10px] text-console-dimText font-mono flex items-center space-x-2">
        <i class="ph-bold ph-activity text-console-accent animate-pulse"></i>
        <span>Tick Rate: 1.5s / Cycle</span>
      </div>

    </div>
  </footer>

  <!-- Simulation JavaScript -->
  <script>
    // --- Data Definitions ---

    // ISO A3 codes for 48 teams of 2026 World Cup with high contrast neon color options
    const teamMetadata = {
      "CAN": { name: "Canada", color: "#E53E3E" },
      "MEX": { name: "Mexico", color: "#319795" },

      "EGY": { name: "Egypt", color: "#9B2C2C" },
      "GHA": { name: "Ghana", color: "#D69E2E" },
      "MAR": { name: "Morocco", color: "#9B2C2C" },
      "SEN": { name: "Senegal", color: "#22543D" },
      "ZAF": { name: "South Africa", color: "#276749" },
      "TUN": { name: "Tunisia", color: "#C53030" },
      "HTI": { name: "Haiti", color: "#2C5282" },
      "PAN": { name: "Panama", color: "#C53030" },
      "ARG": { name: "Argentina", color: "#4FD1C5" }, // Cyber Teal
      "BRA": { name: "Brazil", color: "#ECC94B" }, // Yellow
      "COL": { name: "Colombia", color: "#ECC94B" },
      "ECU": { name: "Ecuador", color: "#D69E2E" },
      "PRY": { name: "Paraguay", color: "#C53030" },
      "URY": { name: "Uruguay", color: "#4299E1" },
      "NZL": { name: "New Zealand", color: "#1A202C" },
      "AUT": { name: "Austria", color: "#C53030" },
      "BEL": { name: "Belgium", color: "#9B2C2C" },
      "BIH": { name: "Bosnia & Herz.", color: "#2B6CB0" },
      "HRV": { name: "Croatia", color: "#E53E3E" },
      "CZE": { name: "Czechia", color: "#2B6CB0" },
      "ENG": { name: "England", color: "#EDF2F7" },
      "FRA": { name: "France", color: "#2B6CB0" },
      "DEU": { name: "Germany", color: "#2D3748" },
      "NLD": { name: "Netherlands", color: "#ED8936" }, // Orange
      "NOR": { name: "Norway", color: "#C53030" },
      "PRT": { name: "Portugal", color: "#276749" },
      "SCO": { name: "Scotland", color: "#2B6CB0" },
      "ESP": { name: "Spain", color: "#C53030" },
      "SWE": { name: "Sweden", color: "#3182CE" },
      "CHE": { name: "Switzerland", color: "#C53030" },
      "TUR": { name: "Türkiye", color: "#C53030" }
    };

    // --- Mock Match Schedule & Results ---
    const matches = [
      // Day 1: June 11
      { date: "2026-06-11", home: "USA", away: "SEN", winner: "USA", score: "2-1", stage: "Group Stage" },
      { date: "2026-06-11", home: "CAN", away: "CIV", winner: "CAN", score: "1-0", stage: "Group Stage" },
      // Day 2: June 12
      { date: "2026-06-12", home: "MEX", away: "SWE", winner: "SWE", score: "0-2", stage: "Group Stage" },
      { date: "2026-06-12", home: "ARG", away: "AUS", winner: "ARG", score: "3-0", stage: "Group Stage" },
      // Day 3: June 13
      { date: "2026-06-13", home: "BRA", away: "JPN", winner: "BRA", score: "2-0", stage: "Group Stage" },
      { date: "2026-06-13", home: "FRA", away: "MAR", winner: "FRA", score: "2-1", stage: "Group Stage" },
      // Day 4: June 14
      { date: "2026-06-14", home: "DEU", away: "EGY", winner: "DEU", score: "3-1", stage: "Group Stage" },
      { date: "2026-06-14", home: "ESP", away: "SAU", winner: "ESP", score: "4-0", stage: "Group Stage" },
      // Day 5: June 15
      { date: "2026-06-15", home: "ENG", away: "TUN", winner: "ENG", score: "2-0", stage: "Group Stage" },
      { date: "2026-06-15", home: "NLD", away: "ECU", winner: "NLD", score: "1-0", stage: "Group Stage" },
      // Day 6: June 16
      { date: "2026-06-16", home: "PRT", away: "KOR", winner: "PRT", score: "2-1", stage: "Group Stage" },
      { date: "2026-06-16", home: "URY", away: "IRQ", winner: "URY", score: "3-0", stage: "Group Stage" },
      // Day 7: June 17
      { date: "2026-06-17", home: "COL", away: "UZB", winner: "COL", score: "2-0", stage: "Group Stage" },
      { date: "2026-06-17", home: "NOR", away: "ZAF", winner: "NOR", score: "1-0", stage: "Group Stage" },
      // Day 8: June 18
      { date: "2026-06-18", home: "BEL", away: "HTI", winner: "BEL", score: "4-1", stage: "Group Stage" },
      { date: "2026-06-18", home: "HRV", away: "PAN", winner: "HRV", score: "2-0", stage: "Group Stage" },
      
      // Day 9: June 19
      { date: "2026-06-19", home: "USA", away: "CAN", winner: "USA", score: "2-1", stage: "Group Stage" },
      { date: "2026-06-19", home: "ARG", away: "SWE", winner: "ARG", score: "1-0", stage: "Group Stage" },
      // Day 10: June 20
      { date: "2026-06-20", home: "BRA", away: "FRA", winner: "BRA", score: "3-2", stage: "Group Stage" },
      { date: "2026-06-20", home: "ESP", away: "DEU", winner: "ESP", score: "2-1", stage: "Group Stage" },
      // Day 11: June 21
      { date: "2026-06-21", home: "ENG", away: "NLD", winner: "ENG", score: "1-0", stage: "Group Stage" },
      { date: "2026-06-21", home: "PRT", away: "URY", winner: "PRT", score: "2-1", stage: "Group Stage" },
      // Day 12: June 22
      { date: "2026-06-22", home: "COL", away: "NOR", winner: "COL", score: "3-1", stage: "Group Stage" },
      { date: "2026-06-22", home: "BEL", away: "HRV", winner: "BEL", score: "2-1", stage: "Group Stage" },

      // --- Knockouts: Round of 32 ---
      { date: "2026-06-28", home: "USA", away: "COL", winner: "USA", score: "2-1", stage: "Round of 32" },
      { date: "2026-06-29", home: "ARG", away: "BEL", winner: "ARG", score: "3-1", stage: "Round of 32" },
      { date: "2026-06-30", home: "BRA", away: "PRT", winner: "BRA", score: "1-0", stage: "Round of 32" },
      { date: "2026-07-01", home: "ESP", away: "ENG", winner: "ESP", score: "3-2", stage: "Round of 32" },

      // --- Round of 16 ---
      { date: "2026-07-05", home: "USA", away: "BRA", winner: "BRA", score: "1-2", stage: "Round of 16" },
      { date: "2026-07-06", home: "ARG", away: "ESP", winner: "ARG", score: "2-1", stage: "Round of 16" },

      // --- Quarterfinals ---
      { date: "2026-07-10", home: "BRA", away: "ARG", winner: "ARG", score: "3-4", stage: "Quarterfinal" },

      // --- Semifinals ---
      { date: "2026-07-11", home: "JPN", away: "AUS", winner: "JPN", score: "2-0", stage: "Group Stage (Mock)" },
      { date: "2026-07-14", home: "ARG", away: "JPN", winner: "ARG", score: "2-0", stage: "Semifinal" },

      // --- Final ---
      { date: "2026-07-19", home: "ARG", away: "ESP", winner: "ARG", score: "3-1", stage: "Final" }
    ];

    const dates = Array.from(new Set(matches.map(m => m.date))).sort();
    let currentDateIndex = 0;
    let playbackInterval = null;
    let worldData = null;

    let originalTeams = Object.keys(teamMetadata);
    
    // Lineage Tracking: originalCountry -> [owner1, owner2, ...]
    let countryLineage = {};

    function initOwnership() {
      countryLineage = {};
      originalTeams.forEach(team => {
        countryLineage[team] = [team];
      });
    }

    function getCurrentOwner(team) {
      const history = countryLineage[team];
      return history ? history[history.length - 1] : team;
    }

    // Run simulation step
    function runSimulationToDateIndex(dateIndex) {
      initOwnership();
      const targetDate = dates[dateIndex];
      const activeMatches = matches.filter(m => m.date <= targetDate);
      const logs = [];

      activeMatches.forEach(match => {
        const winnerCode = match.winner;
        const loserCode = (winnerCode === match.home) ? match.away : match.home;
        
        const ownerOfLoser = getCurrentOwner(loserCode);
        const ownerOfWinner = getCurrentOwner(winnerCode);
        
        if (ownerOfLoser && ownerOfWinner && ownerOfLoser !== ownerOfWinner) {
          let count = 0;
          originalTeams.forEach(team => {
            if (getCurrentOwner(team) === ownerOfLoser) {
              countryLineage[team].push(ownerOfWinner);
              count++;
            }
          });
          logs.push({
            date: match.date,
            winner: teamMetadata[ownerOfWinner].name,
            winnerCode: ownerOfWinner,
            loser: teamMetadata[ownerOfLoser].name,
            loserCode: ownerOfLoser,
            count: count,
            stage: match.stage
          });

          // Trigger massive conquest visual alert banner on active play
          if (count >= 4 && match.date === targetDate) {
            triggerAlert(`[EVENT]: ${teamMetadata[ownerOfWinner].name.toUpperCase()} annexed ${teamMetadata[ownerOfLoser].name.toUpperCase()} (+${count} sectors)`);
          }
        }
      });

      return logs;
    }

    function getLeaderboard() {
      const counts = {};
      originalTeams.forEach(team => {
        const owner = getCurrentOwner(team);
        counts[owner] = (counts[owner] || 0) + 1;
      });

      return Object.entries(counts)
        .map(([teamCode, count]) => ({
          code: teamCode,
          name: teamMetadata[teamCode]?.name || teamCode,
          count: count,
          color: teamMetadata[teamCode]?.color || "#7f8c8d"
        }))
        .sort((a, b) => b.count - a.count);
    }

    // --- Conquest Event Warning Banner ---
    function triggerAlert(message) {
      const banner = document.getElementById("alert-banner");
      document.getElementById("alert-message").innerText = message;
      banner.style.opacity = "1";
      banner.style.transform = "translate(-50%, 0)";
      
      setTimeout(() => {
        banner.style.opacity = "0";
        banner.style.transform = "translate(-50%, -16px)";
      }, 2500);
    }

    // --- D3 Map rendering with Graticules ---
    const svg = d3.select("#world-map");
    const container = d3.select("#map-container");
    const tooltip = d3.select("#tooltip");

    const projection = d3.geoNaturalEarth1()
      .scale(160)
      .translate([window.innerWidth > 1024 ? 380 : 300, 260]);

    const path = d3.geoPath().projection(projection);
    const graticule = d3.geoGraticule();

    // Map Zooming capability
    const zoom = d3.zoom()
      .scaleExtent([1, 8])
      .on("zoom", (event) => {
        svg.selectAll("g").attr("transform", event.transform);
      });

    svg.call(zoom);

    // Initialise and render Map elements
    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(data => {
      worldData = topojson.feature(data, data.objects.countries);
      
      const g = svg.append("g");

      // Draw map Grid
      g.append("path")
        .datum(graticule)
        .attr("class", "graticule")
        .attr("d", path);

      // Render Country Shapes
      g.selectAll(".country")
        .data(worldData.features)
        .enter()
        .append("path")
          .attr("d", path)
          .attr("class", "country")
          .attr("fill", d => getCountryColor(d.properties.name, d.id))
          .on("mouseover", showTooltip)
          .on("mousemove", moveTooltip)
          .on("mouseout", hideTooltip);

      // Slider UI setup
      const slider = document.getElementById("timeline-slider");
      slider.max = dates.length - 1;
      document.getElementById("timeline-end").innerText = formatDateString(dates[dates.length - 1]).toUpperCase();
      document.getElementById("timeline-start").innerText = formatDateString(dates[0]).toUpperCase();

      updateUI();
    });

    function formatDateString(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function getWCCodeFromMap(name, id) {
      return numericToAlpha3[id] || null;
    }

    function getCountryColor(name, id) {
      const alpha3 = getWCCodeFromMap(name, id);
      if (!alpha3) return "#161a22";

      if (originalTeams.includes(alpha3)) {
        const owner = getCurrentOwner(alpha3);
        return teamMetadata[owner]?.color || "#2c3e50";
      }

      return "#161a22";
    }

    // Tooltip logic with modern minimal cards + Lineage tracing
    function showTooltip(event, d) {
      const alpha3 = getWCCodeFromMap(d.properties.name, d.id);
      if (!alpha3 || !originalTeams.includes(alpha3)) {
        tooltip.style("display", "block")
          .html(`
            <div class="text-[10px] text-console-dimText uppercase tracking-wider">Unmapped Zone</div>
            <div class="font-bold font-mono mt-0.5 text-console-text">${d.properties.name}</div>
          `);
        return;
      }

      const originalTeam = teamMetadata[alpha3].name;
      const lineageCodes = countryLineage[alpha3] || [alpha3];
      const currentOwnerCode = lineageCodes[lineageCodes.length - 1];
      const currentOwner = teamMetadata[currentOwnerCode].name;
      const currentOwnerColor = teamMetadata[currentOwnerCode].color;

      // Compose lineage trail (e.g. USA -> BRA -> ARG)
      const lineageTrail = lineageCodes.map(code => teamMetadata[code]?.name || code).join(" ➔ ");

      let content = `
        <div class="text-[9px] text-console-dimText uppercase tracking-wider">Territory Details</div>
        <div class="font-bold text-console-text font-mono text-sm mt-0.5">${originalTeam}</div>
      `;
      
      if (alpha3 !== currentOwnerCode) {
        content += `
          <div class="flex items-center space-x-1.5 mt-2 pt-1.5 border-t border-console-border">
            <span class="w-2 h-2 rounded-full" style="background-color: ${currentOwnerColor}"></span>
            <span class="text-[11px] text-console-dimText">Occupied by:</span>
            <span class="text-[11px] text-console-accent font-bold">${currentOwner}</span>
          </div>
          <div class="mt-2 text-[9px] leading-relaxed text-console-dimText font-mono border-t border-console-border/50 pt-1.5">
            <div class="uppercase tracking-wider text-[8px] mb-0.5">Lineage Trace:</div>
            <span class="text-console-text">${lineageTrail}</span>
          </div>
        `;
      } else {
        content += `
          <div class="text-[10px] text-console-accent mt-2 pt-1 font-bold">// Independent Sovereign</div>
        `;
      }

      tooltip.style("display", "block").html(content);
    }

    function moveTooltip(event) {
      const [x, y] = d3.pointer(event, container.node());
      tooltip.style("left", (x + 15) + "px")
             .style("top", (y + 15) + "px");
    }

    function hideTooltip() {
      tooltip.style("display", "none");
    }

    // --- Interactive Linkage Highlight / Fade ---
    function highlightOwner(ownerCode) {
      d3.selectAll(".country")
        .transition()
        .duration(200)
        .style("opacity", d => {
          const alpha3 = getWCCodeFromMap(d.properties.name, d.id);
          if (!alpha3) return 0.05;
          const currentOwner = getCurrentOwner(alpha3);
          return currentOwner === ownerCode ? 1.0 : 0.12;
        });
    }

    function resetHighlight() {
      d3.selectAll(".country")
        .transition()
        .duration(200)
        .style("opacity", 1.0);
    }

    // --- UI Update Loop ---
    function updateUI() {
      const currentDate = dates[currentDateIndex];
      document.getElementById("current-date-badge").innerText = currentDate;
      document.getElementById("timeline-slider").value = currentDateIndex;

      // Run simulation step
      const logs = runSimulationToDateIndex(currentDateIndex);

      // Update map colors smoothly
      svg.selectAll(".country")
        .transition()
        .duration(400)
        .ease(d3.easeCubicOut)
        .attr("fill", d => getCountryColor(d.properties.name, d.id));

      // Update Leaderboard
      const leaderboard = getLeaderboard();
      const activeFactionsCount = leaderboard.filter(e => e.count > 0).length;
      document.getElementById("active-factions").innerText = `${activeFactionsCount} Factions Active`;

      const leaderboardEl = document.getElementById("leaderboard");
      leaderboardEl.innerHTML = leaderboard
        .filter(entry => entry.count > 0)
        .map((entry, idx) => `
          <div 
            onmouseenter="highlightOwner('${entry.code}')" 
            onmouseleave="resetHighlight()"
            class="flex items-center justify-between p-2 bg-console-bg border border-console-border hover:border-console-accent/40 rounded-sm cursor-pointer transition"
          >
            <div class="flex items-center space-x-2.5">
              <span class="w-3 text-center text-[10px] font-bold text-console-dimText">${idx + 1}</span>
              <span class="w-2 h-2 rounded-full" style="background-color: ${entry.color}"></span>
              <span class="font-medium text-console-text">${entry.name}</span>
            </div>
            <div class="flex items-center space-x-2">
              <span class="text-[10px] text-console-dimText">Holdings:</span>
              <span class="font-bold text-console-accent font-mono">${entry.count}</span>
            </div>
          </div>
        `).join("");

      // Update Terminal Log
      const logEl = document.getElementById("conquest-log");
      if (logs.length === 0) {
        logEl.innerHTML = `<div class="text-console-dimText italic">// Console ready. Awaiting tournament kickoff...</div>`;
      } else {
        logEl.innerHTML = logs.reverse().map(log => `
          <div class="mb-2 leading-relaxed">
            <span class="text-console-dimText">[${log.date}]</span>
            <span class="text-console-text font-bold">${log.winner}</span> 
            <span>annexed</span> 
            <span class="text-console-red font-bold">${log.loser}</span> 
            <span class="text-console-accent">[+${log.count} units]</span>
            <div class="text-[9px] text-console-dimText font-mono uppercase tracking-wider">${log.stage}</div>
          </div>
        `).join("");
      }
    }

    // --- Mobile Responsive Tabs Logic ---
    function switchMobileTab(tab) {
      const mapSec = document.getElementById("map-section");
      const sidePanel = document.getElementById("sidebar-panel");
      const lbSec = document.getElementById("leaderboard-section");
      const logsSec = document.getElementById("logs-section");

      // Tabs active styling
      document.getElementById("tab-map").className = "flex-1 py-3 text-center border-r border-console-border " + (tab === 'map' ? "text-console-accent font-bold" : "");
      document.getElementById("tab-leaderboard").className = "flex-1 py-3 text-center border-r border-console-border " + (tab === 'leaderboard' ? "text-console-accent font-bold" : "");
      document.getElementById("tab-logs").className = "flex-1 py-3 text-center " + (tab === 'logs' ? "text-console-accent font-bold" : "");

      if (tab === 'map') {
        mapSec.classList.remove("hidden");
        sidePanel.classList.add("hidden");
      } else if (tab === 'leaderboard') {
        mapSec.classList.add("hidden");
        sidePanel.classList.remove("hidden");
        lbSec.classList.remove("hidden");
        logsSec.classList.add("hidden");
        sidePanel.className = "w-full bg-console-panel border-b border-console-border flex flex-col h-auto overflow-hidden";
      } else if (tab === 'logs') {
        mapSec.classList.add("hidden");
        sidePanel.classList.remove("hidden");
        lbSec.classList.add("hidden");
        logsSec.classList.remove("hidden");
        sidePanel.className = "w-full bg-console-panel border-b border-console-border flex flex-col h-auto overflow-hidden";
      }
    }

    // Initialize layout for viewport sizes on load
    if (window.innerWidth < 1024) {
      switchMobileTab('map');
    }

    // --- Interactive Control Listeners ---
    const slider = document.getElementById("timeline-slider");
    slider.addEventListener("input", (e) => {
      currentDateIndex = parseInt(e.target.value);
      updateUI();
      if (playbackInterval) stopPlayback();
    });

    document.getElementById("btn-prev").addEventListener("click", () => {
      if (currentDateIndex > 0) {
        currentDateIndex--;
        updateUI();
        if (playbackInterval) stopPlayback();
      }
    });

    document.getElementById("btn-next").addEventListener("click", () => {
      if (currentDateIndex < dates.length - 1) {
        currentDateIndex++;
        updateUI();
        if (playbackInterval) stopPlayback();
      }
    });

    document.getElementById("btn-reset").addEventListener("click", () => {
      currentDateIndex = 0;
      updateUI();
      if (playbackInterval) stopPlayback();
    });

    const playBtn = document.getElementById("btn-play");
    playBtn.addEventListener("click", () => {
      if (playbackInterval) {
        stopPlayback();
      } else {
        startPlayback();
      }
    });

    function startPlayback() {
      playBtn.classList.remove("bg-console-accent", "text-console-bg");
      playBtn.classList.add("bg-console-red", "text-console-text");
      document.getElementById("play-icon").className = "ph-fill ph-pause text-xs";
      document.getElementById("play-text").innerText = "Pause";
      
      playbackInterval = setInterval(() => {
        if (currentDateIndex < dates.length - 1) {
          currentDateIndex++;
          updateUI();
        } else {
          stopPlayback();
        }
      }, 1500);
    }

    function stopPlayback() {
      clearInterval(playbackInterval);
      playbackInterval = null;
      playBtn.classList.add("bg-console-accent", "text-console-bg");
      playBtn.classList.remove("bg-console-red", "text-console-text");
      document.getElementById("play-icon").className = "ph-fill ph-play text-xs";
      document.getElementById("play-text").innerText = "Play";
    }

    // --- ISO 3166-1 Numeric to Alpha-3 Conversion Map ---
    const numericToAlpha3 = {
      "004": "AFG", "008": "ALB", "012": "DZA", "024": "AGO", "032": "ARG",
      "036": "AUS", "040": "AUT", "050": "BGD", "056": "BEL", "076": "BRA",

  </script>
