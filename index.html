  <script>
    // --- Data Definitions ---

    // ISO A3 codes for 48 teams of 2026 World Cup with high contrast neon color options
    let teamMetadata = {};
    let matches = [];

    let dates = [];
    let currentMatchIndex = 0;
    let playbackInterval = null;
    let worldData = null;
    let centroids = {};
    let userOverrides = {};

    const microNations = [
      { code: "CUW", name: "Curaçao", coords: [-68.9900, 12.1696] },
      { code: "CPV", name: "Cabo Verde", coords: [-24.0132, 16.0022] },
      { code: "TTO", name: "Trinidad & Tobago", coords: [-61.2225, 10.6918] },
      { code: "NIR", name: "Northern Ireland", coords: [-6.4923, 54.6538] }
    ];

    // ISO A3 to ISO A2 Flag CDN mapping
    const alpha3To2 = {
      "CAN": "ca", "MEX": "mx", "USA": "us", "AUS": "au", "IRQ": "iq",
      "IRN": "ir", "JPN": "jp", "JOR": "jo", "KOR": "kr", "QAT": "qa",
      "SAU": "sa", "UZB": "uz", "DZA": "dz", "CPV": "cv", "COD": "cd",
      "CIV": "ci", "EGY": "eg", "GHA": "gh", "MAR": "ma", "SEN": "sn",
      "ZAF": "za", "TUN": "tn", "HTI": "ht", "PAN": "pa", "ARG": "ar",
      "BRA": "br", "COL": "co", "ECU": "ec", "PRY": "py", "URY": "uy",
      "NZL": "nz", "AUT": "at", "BEL": "be", "BIH": "ba", "HRV": "hr",
      "CZE": "cz", "ENG": "gb-eng", "FRA": "fr", "DEU": "de", "NLD": "nl",
      "NOR": "no", "PRT": "pt", "SCO": "gb-sct", "WAL": "gb-wls", "NIR": "gb-nir", "ESP": "es", "SWE": "se",
      "CHE": "ch", "TUR": "tr", "CUW": "cw"
    };

    class TacticalAudio {
      constructor() {
        this.ctx = null;
        this.muted = false;
      }

      init() {
        if (!this.ctx) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          this.ctx = new AudioCtx();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }

      playClick() {
        if (this.muted) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1000, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, this.ctx.currentTime + 0.03);
        gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.03);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.03);
      }

      playAlert() {
        if (this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        [110, 165, 220].forEach(freq => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(freq, now);
          osc.frequency.exponentialRampToValueAtTime(freq * 0.95, now + 0.6);
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + 0.6);
        });
      }

      playChime(isPlay) {
        if (this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        const startFreq = isPlay ? 440 : 880;
        const endFreq = isPlay ? 880 : 440;
        osc.frequency.setValueAtTime(startFreq, now);
        osc.frequency.exponentialRampToValueAtTime(endFreq, now + 0.08);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.08);
      }
    }

    const audio = new TacticalAudio();

    function toggleAudio() {
      audio.muted = !audio.muted;
      const btn = document.getElementById("btn-audio-toggle");
      const updateEl = (id, callback) => {
        const el = document.getElementById(id);
        if (el) callback(el);
      };

    function parseUrlOverrides() {

      const altParam = params.get("alt");
      if (altParam) {
        userOverrides = {};
        altParam.split(",").forEach(item => {
          const parts = item.split(":");
          if (parts.length === 2) {
            const idx = parseInt(parts[0]);
            if (!isNaN(idx)) {
              userOverrides[idx] = parts[1];
            }
          }
        });
      }
    }

    function toggleMatchWinner(matchIndex) {
      audio.playClick();
      const match = matches[matchIndex];
      if (!match) return;

      const currentWinner = (userOverrides[matchIndex] !== undefined) ? userOverrides[matchIndex] : match.winner;

      if (currentWinner === match.home) {
        userOverrides[matchIndex] = match.away;
      } else if (currentWinner === match.away) {
        userOverrides[matchIndex] = "";
      } else {
        userOverrides[matchIndex] = match.home;
      }

      updateUI();
    }

    function getFlagImg(code) {

    }

    let originalTeams = [];
    
    // Lineage Tracking: originalCountry -> [owner1, owner2, ...]
    let countryLineage = {};
    let advancingTeams = new Set();
    let lastGroupStageMatchIndex = -1;

    function initOwnership() {
      countryLineage = {};
      originalTeams.forEach(team => {
        countryLineage[team] = [team];
      });
    }

    function getCurrentOwner(team) {
      const history = countryLineage[team];
      return history ? history[history.length - 1] : team;
    }

    function processSingleMatch(match, isLatestStep, logs) {
      const matchIdx = match.originalIndex;
      const winnerCode = (userOverrides[matchIdx] !== undefined) ? userOverrides[matchIdx] : match.winner;
      if (!winnerCode) return; // Skip draws

      const loserCode = (winnerCode === match.home) ? match.away : match.home;
      const isGroupStage = (match.stage === "Group Stage" || match.stage.includes("Group"));

      // Always log match for Live Feed
      logs.unshift({
        matchIndex: matchIdx,
        date: match.date,
        stage: match.stage,
        home: match.home,
        away: match.away,
        score: match.score,
        winner: teamMetadata[winnerCode]?.name || winnerCode,
        winnerCode: winnerCode,
        loser: teamMetadata[loserCode]?.name || loserCode,
        loserCode: loserCode,
        isOverridden: (userOverrides[matchIdx] !== undefined),
        isLatest: isLatestStep,
        isGroupMatch: isGroupStage,
        count: 0
      });

      // NO territory annexation in Group Stage!
      if (isGroupStage) {
        return;
      }

      // Knockout Stage Annexation & Reclaim
      const ownerOfLoser = getCurrentOwner(loserCode);
      const ownerOfWinner = getCurrentOwner(winnerCode);
      
      if (ownerOfWinner !== ownerOfLoser) {
        let count = 0;
        originalTeams.forEach(team => {
          if (getCurrentOwner(team) === ownerOfLoser && countryLineage[team].includes(loserCode)) {
            countryLineage[team].push(ownerOfWinner);
            count++;
          }
        });
        
        logs[0].count = count;
        logs[0].isAnnexation = true;

        if (count >= 4 && isLatestStep) {
          triggerAlert(`[CAPTURE]: ${(teamMetadata[ownerOfWinner]?.name || ownerOfWinner).toUpperCase()} captured ${(teamMetadata[loserCode]?.name || loserCode).toUpperCase()}'s sectors (+${count} sectors)`);
        }
      } else {
        if (ownerOfWinner === loserCode) {
          let count = 0;
          originalTeams.forEach(team => {
            if (getCurrentOwner(team) === loserCode && countryLineage[team].includes(loserCode)) {
              countryLineage[team].push(winnerCode);
              count++;
            }
          });
          logs[0].count = count;
          logs[0].isAnnexation = true;
          logs[0].stage = `${match.stage} (Reclaim)`;

          if (isLatestStep) {
            triggerAlert(`[UPSET]: ${(teamMetadata[winnerCode]?.name || winnerCode).toUpperCase()} reclaimed their sectors from ${(teamMetadata[loserCode]?.name || loserCode).toUpperCase()}!`);
          }
        }
      }
    }

    function runSimulationToStep(targetStepIndex) {
      initOwnership();
      const logs = [];

      let hasPassedGroupStage = false;

      for (let s = 1; s <= targetStepIndex; s++) {
        const step = timelineSteps[s];
        if (!step) continue;

        const isLatestStep = (s === targetStepIndex);

        if (step.type === "group_day") {
          step.matches.forEach(m => {
            processSingleMatch(m, isLatestStep, logs);
          });
        } else if (step.type === "knockout_match") {
          if (!hasPassedGroupStage) {
            hasPassedGroupStage = true;
            // Group Stage Elimination Annexation:
            originalTeams.forEach(team => {
              if (!advancingTeams.has(team)) {
                const suzerain = Array.from(advancingTeams)[0];
                if (suzerain && countryLineage[team]) {
                  countryLineage[team].push(suzerain);
                }
              }
            });
          }

          processSingleMatch(step.match, isLatestStep, logs);
        }
      }

      return logs;
    }

    function getLeaderboard() {
      const counts = {};
      originalTeams.forEach(team => {
        const owner = getCurrentOwner(team);
        counts[owner] = (counts[owner] || 0) + 1;
      });

      return Object.entries(counts)
        .map(([teamCode, count]) => ({
          code: teamCode,
          name: teamMetadata[teamCode]?.name || teamCode,
          count: count,
          color: teamMetadata[teamCode]?.color || "#7f8c8d"

        .sort((a, b) => b.count - a.count);

    function loadEdition(edition) {
      d3.json(`data/${edition}/world_cup_data.json`).then(wcData => {
        teamMetadata = wcData.teams;
        matches = wcData.matches;
        matches.forEach((m, idx) => m.originalIndex = idx);
        dates = Array.from(new Set(matches.map(m => m.date))).sort();
        
        // Insert a Pre-Tournament Day 0 date entry so that simulation starts at a clean kickoff state
        if (dates.length > 0) {
          const firstDate = new Date(dates[0]);
          firstDate.setDate(firstDate.getDate() - 1);
          const preTournamentDate = firstDate.toISOString().split("T")[0];
          dates.unshift(preTournamentDate);
        }
        originalTeams = Object.keys(teamMetadata);

        // Calculate advancing teams and last group stage match index dynamically
        advancingTeams = new Set();
        lastGroupStageMatchIndex = -1;
        matches.forEach((m, idx) => {
          const isGroup = m.stage === "Group Stage" || m.stage.includes("Group");
          if (!isGroup) {
            advancingTeams.add(m.home);
            advancingTeams.add(m.away);
          } else {
            lastGroupStageMatchIndex = idx + 1; // 1-indexed relative to matchIndex slice
          }
        });

        // Build Hybrid Timeline Steps: Group Stage (Day-by-Day) + Knockout Stage (Match-by-Match)
        timelineSteps = [{ type: "kickoff", date: dates[0], label: "KICKOFF" }];

        const groupMatches = matches.filter(m => m.stage === "Group Stage" || m.stage.includes("Group"));
        const groupDates = Array.from(new Set(groupMatches.map(m => m.date))).sort();

        groupDates.forEach(d => {
          const dayMatches = groupMatches.filter(m => m.date === d);
          timelineSteps.push({
            type: "group_day",
            date: d,
            matches: dayMatches,
            label: `GROUP (${d.slice(5)})`
          });
        });

        const knockoutMatches = matches.filter(m => m.stage !== "Group Stage" && !m.stage.includes("Group"));
        knockoutMatches.forEach(m => {
          timelineSteps.push({
            type: "knockout_match",
            date: m.date,
            match: m,
            label: m.stage.toUpperCase()
          });
        });

        parseUrlOverrides();
        currentStepIndex = 0;

        document.getElementById("header-year").innerText = edition;

        // Reset the timeline slider UI to hybrid steps count
        const slider = document.getElementById("timeline-slider");
        slider.min = 0;
        slider.max = timelineSteps.length - 1;
        slider.value = 0;
        document.getElementById("timeline-start").innerText = "KICKOFF";
        document.getElementById("timeline-end").innerText = "FINAL";

              <button onclick="jumpToStage('r32')" class="px-2 py-0.5 bg-console-bg border border-console-border hover:border-console-red text-console-red rounded-sm transition cursor-pointer">⚔️ 淘汰赛 (32强)</button>
              <button onclick="jumpToStage('final')" class="px-2 py-0.5 bg-console-bg border border-console-border hover:border-console-yellow text-console-yellow rounded-sm transition cursor-pointer">👑 决胜夜 FINAL</button>
            </div>
            <span class="text-console-dimText text-[9px] hidden md:inline">小组赛0领土吞并 • 淘汰赛实时领土割据</span>
          `;
        }

        // Repopulate initial ownership state
        initOwnership();

        // Redraw/color countries to their day-0 initial state
        svg.selectAll(".country")
          .transition()
          .duration(300)
          .attr("fill", d => {
            if (d.code) {
              return getCountryColor(d.properties ? d.properties.name : (d.name || ""), null, d.code);
            }
            return getCountryColor(d.properties ? d.properties.name : "", d.id);

          .style("opacity", 1.0);

        // Refresh dynamic UI elements (leaderboard, logs, badging)

      });

    function getWCCodeFromMap(name, id, code) {
      if (code) return code;
      const alpha3 = numericToAlpha3[id] || null;
      if (alpha3 === "GBR") {
        return "ENG";
      }
      return alpha3;
    }

    function updateCentroidsCache() {
      centroids = {};
      worldData.features.forEach(f => {
        const code = getWCCodeFromMap(f.properties ? f.properties.name : "", f.id, f.code);
        if (code) {
          centroids[code] = path.centroid(f);
        }
      });
      if (centroids["ENG"]) {
        centroids["ENG"] = projection([-1.1743, 52.3555]);
      }
      microNations.forEach(m => {
        centroids[m.code] = projection(m.coords);
      });

      const alpha3 = getWCCodeFromMap(name, id, code);
      const unmappedColor = isLightTheme ? "#d1d5db" : "#161a22";

      if (originalTeams.includes(alpha3)) {
        const owner = getCurrentOwner(alpha3);
        return teamMetadata[owner]?.color || "#2c3e50";

      return unmappedColor;

      const lineageTrail = lineageCodes.map(code => teamMetadata[code]?.name || code).join(" ➔ ");

      let content = `
        <div class="text-[9px] text-console-dimText uppercase tracking-wider">Territory Details</div>
        <div class="flex items-center space-x-2 mt-1">
          ${getFlagImg(alpha3)}
          <span class="font-bold text-console-text font-sans text-sm">${originalTeam}</span>
        </div>
      `;
      
      if (alpha3 !== currentOwnerCode) {
        content += `
          <div class="flex items-center space-x-2 mt-2 pt-1.5 border-t border-console-border">
            ${getFlagImg(currentOwnerCode)}
            <span class="text-[11px] text-console-dimText">Held by:</span>
            <span class="text-[11px] text-console-accent font-bold font-sans">${currentOwner}</span>
          </div>
          <div class="mt-2 text-[9px] leading-relaxed text-console-dimText font-mono border-t border-console-border/50 pt-1.5">
            <div class="uppercase tracking-wider text-[8px] mb-0.5">Lineage Trace:</div>
            <span class="text-console-text">${lineageTrail}</span>
          </div>
        `;
      } else {
        content += `
          <div class="text-[10px] text-console-accent mt-2 pt-1 font-bold font-mono">// Independent</div>
        `;
      }

      tooltip.style("display", "block").html(content);

      if (alpha3) {
        const owner = getCurrentOwner(alpha3);
        if (owner && owner !== alpha3) {
          d3.select(`#country-${owner}`).classed("suzerain-highlight", true);
        }
      }
    }

    function moveTooltip(event) {
      const [x, y] = d3.pointer(event, container.node());
      tooltip.style("left", (x + 15) + "px")
             .style("top", (y + 15) + "px");
    }

    function hideTooltip(event, d) {
      tooltip.style("display", "none");
      
      if (d) {
        const alpha3 = d.code || getWCCodeFromMap(d.properties ? d.properties.name : "", d.id);
        if (alpha3) {
          const owner = getCurrentOwner(alpha3);
          if (owner && owner !== alpha3) {
            d3.select(`#country-${owner}`).classed("suzerain-highlight", false);
          }
        }
      }
    }

    // --- Interactive Linkage Highlight / Fade ---
    function highlightOwner(ownerCode) {
      d3.selectAll(".country")
        .transition()
        .duration(200)
        .style("opacity", d => {
          const alpha3 = d.code || getWCCodeFromMap(d.properties ? d.properties.name : "", d.id);
          if (!alpha3) return 0.05;
          const currentOwner = getCurrentOwner(alpha3);
          return currentOwner === ownerCode ? 1.0 : 0.12;
        });
    }

    function resetHighlight() {
      d3.selectAll(".country")
        .transition()
        .duration(200)
        .style("opacity", 1.0);
    }

    // --- UI Update Loop ---
    function updateUI() {
      const step = timelineSteps[currentStepIndex] || timelineSteps[0];
      let currentDate = dates[0];
      let playingTeams = [];
      let activeDayMatches = [];

      if (step && step.type === "group_day") {
        currentDate = step.date;
        activeDayMatches = step.matches;
        playingTeams = Array.from(new Set(step.matches.flatMap(m => [m.home, m.away])));
        document.getElementById("current-date-badge").innerText = `${formatDateString(currentDate)} • Group Stage`;
      } else if (step && step.type === "knockout_match") {
        currentDate = step.match.date;
        activeDayMatches = [step.match];
        playingTeams = [step.match.home, step.match.away];
        document.getElementById("current-date-badge").innerText = `${formatDateString(currentDate)} • ${step.match.stage}`;
      } else {
        document.getElementById("current-date-badge").innerText = `${currentDate || 'KICKOFF'} • Kickoff`;
      }

      document.getElementById("timeline-slider").value = currentStepIndex;

      // Run simulation step
      const logs = runSimulationToStep(currentStepIndex);

      // Update map colors smoothly
      svg.selectAll(".country")
        .transition()
        .duration(400)
        .ease(d3.easeCubicOut)
        .attr("fill", d => {
          if (d.code) {
            return getCountryColor(d.properties ? d.properties.name : (d.name || ""), null, d.code);
          }
          return getCountryColor(d.properties ? d.properties.name : "", d.id);
        })
        .attr("class", d => {
          const alpha3 = d.code || getWCCodeFromMap(d.properties ? d.properties.name : "", d.id);
          let classes = d.code ? "country micro-nation" : "country";
          if (alpha3) {
            if (playingTeams.includes(alpha3)) {
              classes += " playing-highlight";
            }
            const owner = getCurrentOwner(alpha3);
            if (alpha3 === owner) {
              const isEmpire = originalTeams.filter(t => getCurrentOwner(t) === owner).length > 1;
              if (isEmpire) {
                classes += " empire-capital";
              }
            }
          }
          return classes;
        });

      // Render Empire Flow Vector Arcs
      const vectorGroup = svg.select(".vector-layer");
      vectorGroup.selectAll("*").remove(); // Clear previous arcs

      // Find all active empires (teams owning > 1 territory)
      originalTeams.forEach(suzerainCode => {
        const holdings = originalTeams.filter(t => getCurrentOwner(t) === suzerainCode);
        if (holdings.length > 1 && centroids[suzerainCode]) {
          const [cx0, cy0] = centroids[suzerainCode];
          const color = teamMetadata[suzerainCode]?.color || "#00ff66";

          holdings.forEach(vassalCode => {
            if (vassalCode !== suzerainCode && centroids[vassalCode]) {
              const [cx1, cy1] = centroids[vassalCode];
              
              // Calculate control point for curved quadratic arc Q
              const midX = (cx0 + cx1) / 2;
              const midY = (cy0 + cy1) / 2;
              const dx = cx1 - cx0;
              const dy = cy1 - cy0;
              const dist = Math.sqrt(dx * dx + dy * dy);
              
              // Offset control point perpendicular to line
              const offset = Math.min(dist * 0.25, 45);
              const ctrlX = midX - (dy / (dist || 1)) * offset;
              const ctrlY = midY + (dx / (dist || 1)) * offset;

              const dStr = `M ${cx1} ${cy1} Q ${ctrlX} ${ctrlY} ${cx0} ${cy0}`;

              vectorGroup.append("path")
                .attr("d", dStr)
                .attr("class", `flow-arc flow-arc-${suzerainCode}`)
                .attr("stroke", color)
                .attr("stroke-width", "1.2px")
                .attr("opacity", 0.45);
            }
          });
        }
      });

      // Update Leaderboard
      const leaderboard = getLeaderboard();
      const activeFactionsCount = leaderboard.filter(e => e.count > 0).length;
      document.getElementById("active-factions").innerText = `${activeFactionsCount} Factions Active`;

      // Render Conquest Champion Banner at end of tournament
      const championContainer = document.getElementById("champion-container");
      if (championContainer) {
        if (currentMatchIndex === matches.length && leaderboard.length > 0) {
          const champion = leaderboard[0];
          const totalCount = originalTeams.length;
          championContainer.innerHTML = `
            <div class="mb-3 p-3 bg-gradient-to-r from-yellow-500/20 via-console-panel to-yellow-500/10 border border-yellow-400/80 rounded-sm font-mono shadow-xl relative overflow-hidden">
              <div class="text-[9px] uppercase tracking-widest text-yellow-400 font-bold flex items-center space-x-1">
                <i class="ph-fill ph-trophy text-xs animate-bounce"></i>
                <span>Conquest Champion</span>
              </div>
              <div class="flex items-center space-x-3 mt-1.5">
                ${getFlagImg(champion.code)}
                <span class="font-sans font-bold text-sm text-white">${champion.name}</span>
                <span class="ml-auto font-bold text-yellow-400 text-xs">${champion.count} / ${totalCount} SECTORS</span>
              </div>
            </div>
          `;
        } else {
          championContainer.innerHTML = "";
        }
      }

      renderStageJumpBar();

      const leaderboardEl = document.getElementById("leaderboard");
      leaderboardEl.innerHTML = leaderboard
        .filter(entry => entry.count > 0)
        .map((entry, idx) => `
          <div 
            onmouseenter="highlightOwner('${entry.code}')" 
            onmouseleave="resetHighlight()"
            class="flex items-center justify-between p-2 bg-console-bg border border-console-border hover:border-console-accent/40 rounded-sm cursor-pointer transition"
          >
            <div class="flex items-center space-x-2.5">
              <span class="w-3 text-center font-mono text-[9px] font-bold text-console-dimText">${idx + 1}</span>
              ${getFlagImg(entry.code)}
              <span class="w-2.5 h-2.5 rounded-full" style="background-color: ${entry.color}"></span>
              <span class="text-[11px] font-semibold text-console-text font-sans">${entry.name}</span>
            </div>
            <div class="flex items-center space-x-2 font-mono">
              <span class="text-[9px] text-console-dimText">HOLDINGS:</span>
              <span class="font-bold text-console-accent text-[11px]">${entry.count}</span>
            </div>
          </div>
        `).join("");

      // Sandbox status indicator
      const overrideCount = Object.keys(userOverrides).length;
      const resetBtn = document.getElementById("btn-reset-overrides");
      const statusLabel = document.getElementById("sim-status-label");
      if (overrideCount > 0) {
        resetBtn.classList.remove("hidden");
        statusLabel.innerText = `Status: Parallel Universe (${overrideCount} Alt)`;
        statusLabel.className = "text-[10px] uppercase font-mono text-console-accent font-bold animate-pulse";
      } else {
        resetBtn.classList.add("hidden");
        statusLabel.innerText = "Status: Simulating";
        statusLabel.className = "text-[10px] uppercase font-mono text-console-dimText";
      }

      // Update Terminal Log / Overrides list
      const logEl = document.getElementById("conquest-log");
      
      if (logs.length === 0) {
        logEl.innerHTML = `<div class="text-console-dimText italic text-[10px]">// Console ready. Awaiting tournament kickoff...</div>`;
      } else {
        logEl.innerHTML = logs.map(log => {
          const isLatest = log.isLatest;
          const matchIdx = log.matchIndex;
          const isOverridden = log.isOverridden;

          if (log.isGroupMatch) {
            const homeName = teamMetadata[log.home]?.name || log.home;
            const awayName = teamMetadata[log.away]?.name || log.away;
            const winnerName = teamMetadata[log.winnerCode]?.name || log.winnerCode;

            return `
              <div 
                onclick="toggleMatchWinner(${matchIdx})"
                title="Click to cycle match result (Sandbox Mode)"
                class="mb-1.5 p-1.5 bg-console-bg border ${isLatest ? 'border-console-accent bg-console-accent/5 shadow-md shadow-console-accent/5' : isOverridden ? 'border-console-accent/40 bg-console-accent/2' : 'border-console-border hover:border-console-accent/40'} rounded-sm cursor-pointer transition flex items-center justify-between group"
              >
                <div class="text-[10px] font-mono leading-tight">
                  <div class="text-[9px] text-console-dimText flex items-center space-x-1">
                    <span>${log.date}</span>
                    <span>•</span>
                    <span>${log.stage}</span>
                    ${isOverridden ? '<span class="text-console-accent font-bold ml-1">[ALT]</span>' : ''}
                    ${isLatest ? '<span class="text-console-accent bg-console-accent/10 px-1 rounded ml-1 font-bold">LATEST</span>' : ''}
                  </div>
                  <div class="text-console-text font-semibold mt-0.5">
                    ${getFlagImg(log.home)} ${homeName} <span class="text-console-dimText font-normal">vs</span> ${awayName} ${getFlagImg(log.away)}
                  </div>
                  <div class="text-[10px] mt-0.5 flex items-center space-x-2">
                    <span class="text-console-accent font-bold">${winnerName} WIN</span>
                    <span class="text-console-dimText/70 text-[9px]">• Real: ${log.score}</span>
                  </div>
                </div>
                <div class="text-[10px] text-console-dimText group-hover:text-console-accent transition flex items-center space-x-1">
                  <i class="ph-bold ph-pencil-simple"></i>
                </div>
              </div>
            `;
          }

          return `
            <div 
              onclick="toggleMatchWinner(${matchIdx})"
              title="Click to cycle match result (Sandbox Mode)"
              class="mb-1.5 p-1.5 bg-console-bg border ${isLatest ? 'border-console-accent bg-console-accent/5 shadow-md shadow-console-accent/5' : isOverridden ? 'border-console-accent/40 bg-console-accent/2' : 'border-console-border hover:border-console-accent/40'} rounded-sm cursor-pointer transition flex items-center justify-between group"
            >
              <div class="text-[10px] font-mono leading-tight">
                <div class="text-[9px] text-console-dimText flex items-center space-x-1">
                  <span>${log.date}</span>
                  <span>•</span>
                  <span>${log.stage}</span>
                  ${isOverridden ? '<span class="text-console-accent font-bold ml-1">[ALT]</span>' : ''}
                  ${isLatest ? '<span class="text-console-accent bg-console-accent/10 px-1 rounded ml-1 font-bold">LATEST</span>' : ''}
                </div>
                <div class="text-console-text font-semibold mt-0.5">
                  ${getFlagImg(log.winnerCode)} ${log.winner} <span class="text-console-dimText font-normal">annexed</span> ${getFlagImg(log.loserCode)} ${log.loser}
                </div>
                <div class="text-[10px] mt-0.5 flex items-center space-x-2">
                  <span class="text-console-accent font-bold">+${log.count} Sectors</span>
                </div>
              </div>
              <div class="text-[10px] text-console-dimText group-hover:text-console-accent transition flex items-center space-x-1">
                <i class="ph-bold ph-pencil-simple"></i>
              </div>
            </div>
          `;
        }).join("");
      }

      // Focus map camera on playing teams
      focusMapOnTeams(playingTeams);

      // Render Floating Mobile Match Carousel Overlay
      const carouselEl = document.getElementById("mobile-match-carousel");
      if (carouselEl) {
        if (activeDayMatches.length === 0) {
          carouselEl.classList.add("hidden");
          carouselEl.innerHTML = "";
        } else {
          carouselEl.classList.remove("hidden");
          carouselEl.innerHTML = activeDayMatches.map(match => {
            const idx = match.originalIndex;
            const currentWinner = (userOverrides[idx] !== undefined) ? userOverrides[idx] : match.winner;
            const isOverridden = (userOverrides[idx] !== undefined);
            
            let simmedScoreText = "";
            if (currentWinner === match.home) {
              simmedScoreText = "H-WIN";
            } else if (currentWinner === match.away) {
              simmedScoreText = "A-WIN";
            } else {
              simmedScoreText = "DRAW";
            }
            
            return `
              <div 
                onclick="toggleMobileSandbox(${idx})"
                class="flex items-center justify-between bg-console-panel border ${isOverridden ? 'border-console-accent bg-console-accent/5' : 'border-console-border'} p-2 rounded-sm font-mono text-[9px] space-x-2.5 shadow-lg min-w-[170px] shrink-0 active:scale-95 transition cursor-pointer"
              >
                <div class="flex items-center space-x-1">
                  ${getFlagImg(match.home)}
                  <span class="font-bold ${currentWinner === match.home ? 'text-console-accent' : 'text-console-text'}">${match.home}</span>
                </div>
                <div class="flex flex-col items-center leading-tight">
                  <span class="text-console-dimText text-[8px]">Real: ${match.score}</span>
                  <span class="text-console-accent font-bold text-[8px]">${simmedScoreText}</span>
                </div>
                <div class="flex items-center space-x-1">
                  <span class="font-bold ${currentWinner === match.away ? 'text-console-accent' : 'text-console-text'}">${match.away}</span>
                  ${getFlagImg(match.away)}
                </div>
              </div>
            `;
          }).join("");
        }
      }
    }

    function toggleMobileSandbox(matchIdx) {
      const match = matches[matchIdx];
      const currentWinner = userOverrides[matchIdx];
      if (currentWinner === match.home) {
        userOverrides[matchIdx] = match.away;
      } else if (currentWinner === match.away) {
        userOverrides[matchIdx] = "";
      } else {
        userOverrides[matchIdx] = match.home;
      }
      updateUI();
      // Sync overrides to URL
      const overridesStr = Object.entries(userOverrides)
        .map(([idx, winner]) => `${idx}:${winner}`)
        .join(",");
      const url = new URL(window.location.href);
      if (overridesStr) {
        url.searchParams.set("alt", overridesStr);
      } else {
        url.searchParams.delete("alt");
      }
      window.history.replaceState({}, "", url.toString());
    }

    let isMobileLegendExpanded = false;
    function toggleMobileLegend() {
      isMobileLegendExpanded = !isMobileLegendExpanded;
      const overlay = document.getElementById("legend-overlay");
      const btn = document.getElementById("btn-legend-toggle");
      if (isMobileLegendExpanded) {
        overlay.classList.remove("hidden");
        overlay.classList.add("block");
        btn.innerHTML = `<i class="ph-bold ph-x text-sm"></i>`;
      } else {
        overlay.classList.add("hidden");
        overlay.classList.remove("block");
        btn.innerHTML = `<i class="ph-bold ph-question text-sm"></i>`;
      }
    }

    function focusMapOnTeams(teams) {
      if (!teams || teams.length === 0) {
        const width = container.node().clientWidth || 800;
        const height = container.node().clientHeight || 500;
        svg.transition().duration(750).call(
          zoom.transform,
          d3.zoomIdentity
        );
        return;
      }

      const coords = [];
      teams.forEach(code => {
        const c = centroids[code];
        if (c) coords.push(c);
      });

      if (coords.length === 0) return;

      let minX = d3.min(coords, d => d[0]);
      let maxX = d3.max(coords, d => d[0]);
      let minY = d3.min(coords, d => d[1]);
      let maxY = d3.max(coords, d => d[1]);

      const width = container.node().clientWidth || 800;
      const height = container.node().clientHeight || 500;

      const dx = maxX - minX || 40;
      const dy = maxY - minY || 40;
      const x = (minX + maxX) / 2;
      const y = (minY + maxY) / 2;

      let scale = Math.min(4.5, 0.55 / Math.max(dx / width, dy / height));
      if (scale < 1.0) scale = 1.0;

      svg.transition().duration(750).call(
        zoom.transform,
        d3.zoomIdentity
          .translate(width / 2, height / 2)
          .scale(scale)
          .translate(-x, -y)
      );
    }

    // --- Mobile Responsive Tabs Logic ---
    function switchMobileTab(tab) {
      const mapSec = document.getElementById("map-section");
      const sidePanel = document.getElementById("sidebar-panel");
      const lbSec = document.getElementById("leaderboard-section");
      const logsSec = document.getElementById("logs-section");

      // Tabs active styling
      document.getElementById("tab-map").className = "flex-1 py-3 text-center border-r border-console-border " + (tab === 'map' ? "text-console-accent font-bold" : "");
      document.getElementById("tab-leaderboard").className = "flex-1 py-3 text-center border-r border-console-border " + (tab === 'leaderboard' ? "text-console-accent font-bold" : "");
      document.getElementById("tab-logs").className = "flex-1 py-3 text-center " + (tab === 'logs' ? "text-console-accent font-bold" : "");

      if (tab === 'map') {
        mapSec.classList.remove("hidden");
        sidePanel.classList.add("hidden");
      } else if (tab === 'leaderboard') {
        mapSec.classList.add("hidden");
        sidePanel.classList.remove("hidden");
        lbSec.classList.remove("hidden");
        logsSec.classList.add("hidden");
        sidePanel.className = "w-full bg-console-panel border-b border-console-border flex flex-col h-auto overflow-hidden";
      } else if (tab === 'logs') {
        mapSec.classList.add("hidden");
        sidePanel.classList.remove("hidden");
        lbSec.classList.add("hidden");
        logsSec.classList.remove("hidden");
        sidePanel.className = "w-full bg-console-panel border-b border-console-border flex flex-col h-auto overflow-hidden";
      }
    }

    // Initialize layout for viewport sizes on load
    if (window.innerWidth < 1024) {
      switchMobileTab('map');
    }

    function renderStageJumpBar() {
      const bar = document.getElementById("stage-jump-bar");
      if (!matches || matches.length === 0 || !bar) return;

      const stageMap = {};
      matches.forEach((m, idx) => {
        let key = m.stage;
        if (key.includes("Group")) key = "Group Stage";
        if (stageMap[key] === undefined) {
          stageMap[key] = idx + 1;
        }
      });

      const stageLabels = {
        "Group Stage": "GROUP",
        "Round of 16": "R16",
        "Quarterfinal": "QUARTER",
        "Semifinal": "SEMI",
        "Third-Place Match": "3RD PLACE",
        "Final": "FINAL"
      };

      bar.innerHTML = Object.entries(stageMap).map(([stage, matchIdx]) => {
        const label = stageLabels[stage] || stage.toUpperCase();
        const isActive = (currentMatchIndex >= matchIdx);
        return `
          <button 
            onclick="jumpToMatchIndex(${matchIdx})" 
            title="Jump to ${stage}"
            class="px-1.5 py-0.5 rounded transition cursor-pointer font-mono text-[9px] ${isActive ? 'text-console-accent font-bold bg-console-accent/10 border border-console-accent/30' : 'hover:text-console-text text-console-dimText'}"
          >
            • ${label}
          </button>
        `;
      }).join("");
    }

    function jumpToStage(stage) {
      audio.playClick();
      if (playbackInterval) stopPlayback();
      if (stage === 'kickoff') {
        currentStepIndex = 0;
      } else if (stage === 'group') {
        const idx = timelineSteps.findIndex(s => s.type === 'group_day');
        currentStepIndex = idx !== -1 ? idx : 0;
      } else if (stage === 'r32') {
        const idx = timelineSteps.findIndex(s => s.type === 'knockout_match');
        currentStepIndex = idx !== -1 ? idx : 0;
      } else if (stage === 'final') {
        currentStepIndex = timelineSteps.length - 1;
      }
      updateUI();
    }

    function jumpToMatchIndex(matchIdx) {
      audio.playClick();
      if (playbackInterval) stopPlayback();
      // Find step that contains this matchIdx
      const stepIdx = timelineSteps.findIndex(s => {
        if (s.type === 'knockout_match') return s.match.originalIndex === matchIdx;
        if (s.type === 'group_day') return s.matches.some(m => m.originalIndex === matchIdx);
        return false;
      });
      if (stepIdx !== -1) {
        currentStepIndex = stepIdx;
        updateUI();
      }
    }

    // Global Keyboard Hotkeys Listener
    document.addEventListener("keydown", (e) => {
      if (["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) return;

      if (e.code === "Space") {
        e.preventDefault();
        document.getElementById("btn-play").click();
      } else if (e.code === "ArrowLeft") {
        e.preventDefault();
        document.getElementById("btn-prev").click();
      } else if (e.code === "ArrowRight") {
        e.preventDefault();
        document.getElementById("btn-next").click();
      } else if (e.code === "KeyR") {
        e.preventDefault();
        resetOverrides();
      } else if (e.code === "KeyM") {
        e.preventDefault();
        toggleAudio();
      }
    });

    // --- Interactive Control Listeners ---
    const slider = document.getElementById("timeline-slider");
    slider.addEventListener("input", (e) => {
      audio.playClick();
      currentStepIndex = parseInt(e.target.value);
      updateUI();
      if (playbackInterval) stopPlayback();
    });

    document.getElementById("btn-prev").addEventListener("click", () => {
      if (currentStepIndex > 0) {
        audio.playClick();
        currentStepIndex--;
        updateUI();
        if (playbackInterval) stopPlayback();
      }
    });

    document.getElementById("btn-next").addEventListener("click", () => {
      if (currentStepIndex < timelineSteps.length - 1) {
        audio.playClick();
        currentStepIndex++;
        updateUI();
        if (playbackInterval) stopPlayback();
      }
    });

    document.getElementById("btn-reset").addEventListener("click", () => {
      audio.playClick();
      currentStepIndex = 0;
      updateUI();
      if (playbackInterval) stopPlayback();
    });

    const playBtn = document.getElementById("btn-play");
    playBtn.addEventListener("click", () => {
      if (playbackInterval) {
        stopPlayback();
      } else {
        startPlayback();
      }
    });

    function startPlayback() {
      audio.playChime(true);
      playBtn.classList.remove("bg-console-accent", "text-console-bg");
      playBtn.classList.add("bg-console-red", "text-console-text");
      document.getElementById("play-icon").className = "ph-fill ph-pause text-xs";
      document.getElementById("play-text").innerText = "Pause";
      
      playbackInterval = setInterval(() => {
        if (currentStepIndex < timelineSteps.length - 1) {
          currentStepIndex++;
          updateUI();
        } else {
          stopPlayback();
        }
      }, 1500);
    }

    function stopPlayback() {
      audio.playChime(false);
      clearInterval(playbackInterval);
      playbackInterval = null;
      playBtn.classList.add("bg-console-accent", "text-console-bg");
      playBtn.classList.remove("bg-console-red", "text-console-text");
      document.getElementById("play-icon").className = "ph-fill ph-play text-xs";
      document.getElementById("play-text").innerText = "Play";
    }

    // --- Vertical Resizer for Live Feed [Desktop] ---
    const resizer = document.getElementById("resizer-handle");
    const logsSection = document.getElementById("logs-section");
    let isResizing = false;

    if (resizer && logsSection) {
      resizer.addEventListener("mousedown", (e) => {
        isResizing = true;
        document.body.classList.add("cursor-ns-resize");
      });

      document.addEventListener("mousemove", (e) => {
        if (!isResizing) return;
        const sidebarRect = document.getElementById("sidebar-panel").getBoundingClientRect();
        const newHeight = sidebarRect.bottom - e.clientY;
        if (newHeight >= 100 && newHeight <= sidebarRect.height - 150) {
          logsSection.style.height = `${newHeight}px`;
        }
      });

      document.addEventListener("mouseup", () => {
        if (isResizing) {
          isResizing = false;
          document.body.classList.remove("cursor-ns-resize");
        }
      });
    }
